<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>JavaScript 入门指南</title>
</head>

<body>
  <article>
    <h2>变量声明</h2>
    <p>JavaScript中有三种变量声明方式：var、let和const。</p>
    <br>
    <p><strong>var</strong>：函数作用域，可以重复声明</p>
    <p><strong>let</strong>：块级作用域，不能重复声明</p>
    <p><strong>const</strong>：块级作用域，声明后不能重新赋值</p>
    <br>
    <h2>数据类型</h2>
    <p>JavaScript包含原始类型（字符串、数字、布尔值）和引用类型（对象、数组）。</p>
    <br>
    <h2>函数</h2>
    <p>函数是JavaScript中的核心概念，可以用多种方式定义。</p>
  </article>
</body>

</html>
