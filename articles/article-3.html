<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS3 动画实战</title>
</head>
<body>
    <article>
        <h2>过渡效果</h2>
        <p>使用transition属性可以创建平滑的状态变化。</p>
        <br>
        <pre><code>transition: all 0.3s ease;</code></pre>
        <br>
        <h2>关键帧动画</h2>
        <p>@keyframes规则允许我们定义更复杂的动画序列。</p>
        <br>
        <pre><code>@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}</code></pre>
        <br>
        <h2>变换</h2>
        <p>transform属性可以旋转、缩放、倾斜和移动元素。</p>
    </article>
</body>
</html>
