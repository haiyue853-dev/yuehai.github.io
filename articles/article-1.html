<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片懒加载 & 路由懒加载</title>
</head>
<body>
    <article>
        <p>图片懒加载原理：只加载可视区域图片，进入视口再赋值真实图片地址，减少首屏资源压力。实现：原生 IntersectionObserver 监听元素是否进入视口；第三方插件 vue-lazyload 快速使用。<br>路由懒加载原理：用 import () 动态导入，路由切换时才加载对应组件，拆分打包、减小首屏体积。写法：component: () => import('@/views/xxx.vue')</p>
    </article>
</body>
</html>
