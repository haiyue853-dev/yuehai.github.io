<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>响应式网页设计</title>
</head>
<body>
    <article>
        <h2>视口元标签</h2>
        <p>使用viewport meta标签来控制页面在移动设备上的显示。</p>
        <br>
        <pre><code>&lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;</code></pre>
        <br>
        <h2>媒体查询</h2>
        <p>@media规则允许我们根据不同设备特性应用不同样式。</p>
        <br>
        <pre><code>@media (max-width: 768px) {
    /* 移动端样式 */
}</code></pre>
        <br>
        <h2>弹性布局</h2>
        <p>Flexbox和Grid是现代CSS布局的重要工具。</p>
    </article>
</body>
</html>
