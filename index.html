<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>
    
    <header class="header">
        <nav class="nav">
            <a href="#" class="logo">Blog</a>
            <ul class="nav-links">
                <li><a href="#home" class="active">首页</a></li>
                <li><a href="#articles">文章</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="profile-container">
                <div class="avatar">
                    <img src="images/avatar.jpg" alt="头像" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23ddd%22/><circle cx=%2250%22 cy=%2240%22 r=%2220%22 fill=%22%23bbb%22/><ellipse cx=%2250%22 cy=%2275%22 rx=%2225%22 ry=%2220%22 fill=%22%23bbb%22/></svg>'">
                </div>
                <h1 class="name">你的名字</h1>
                <p class="bio">热爱技术，热爱生活</p>
                <div class="social-links">
                    <a href="mailto:your-email@example.com" class="social-item" title="邮箱">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="https://github.com/yourgithub" target="_blank" class="social-item" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </section>

        <section id="articles" class="articles-section">
            <h2 class="section-title">文章</h2>
            <div class="articles-grid" id="articlesGrid">
                <!-- 文章将通过JS动态加载 -->
            </div>
        </section>

        <section id="about" class="about-section">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
                <p>你好！我是你的名字，一个热爱技术和编程的开发者。</p>
                <p>这里是我的个人博客，我会分享一些技术文章和心得体会。</p>
                <div class="contact-info">
                    <a href="mailto:your-email@example.com" class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>your-email@example.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 你的名字. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
